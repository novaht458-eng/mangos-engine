name: Mangos Engine Forge

on: [push]

jobs:
  forge-sdl2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Mangos Repo
        uses: actions/checkout@v4

      - name: Checkout SDL2 Source (FIXED)
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL2
          path: SDL_Source
          fetch-depth: 1

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build SDL2 for Android (arm64)
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653

          mkdir -p SDL_Source/build
          cd SDL_Source/build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=21 \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST=OFF

          cmake --build .

      - name: Upload SDL2 .so
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-android-arm64
          path: SDL_Source/build/libSDL2*.so
