name: Mangos Engine Forge

on: [push]

jobs:
  forge-sdl2:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Mangos Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build

      - name: Clone SDL2
        run: |
          git clone https://github.com/libsdl-org/SDL.git SDL_Source
          cd SDL_Source
          git checkout SDL2

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build SDL2 (${{ matrix.abi }})
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653

          mkdir -p build-${{ matrix.abi }}
          cd build-${{ matrix.abi }}

          cmake ../SDL_Source \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=21 \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST=OFF

          cmake --build .

      - name: Upload .so (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-${{ matrix.abi }}
          path: build-${{ matrix.abi }}/libSDL2*.so
