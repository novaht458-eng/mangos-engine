name: Mangos SDL2 Full Pack

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build zip

      - name: Clone SDL2
        run: |
          git clone https://github.com/libsdl-org/SDL.git SDL
          cd SDL && git checkout SDL2

      - name: Clone SDL_image
        run: git clone https://github.com/libsdl-org/SDL_image.git

      - name: Clone SDL_mixer
        run: git clone https://github.com/libsdl-org/SDL_mixer.git

      - name: Clone SDL_ttf
        run: git clone https://github.com/libsdl-org/SDL_ttf.git

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build ALL (${{ matrix.abi }})
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653
          ABI=${{ matrix.abi }}

          mkdir -p output/$ABI

          build () {
            NAME=$1
            SRC=$2
            EXTRA=$3

            mkdir -p build-$NAME-$ABI
            cd build-$NAME-$ABI

            cmake ../$SRC \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=21 \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL2_DIR=$PWD/../build-SDL-$ABI \
              -DSDL_SHARED=ON \
              -DSDL_STATIC=OFF \
              $EXTRA

            cmake --build . || exit 1

            cp *.so ../output/$ABI/ 2>/dev/null || true
            cd ..
          }

          # SDL base
          build SDL SDL ""

          # SDL_image (sin dependencias externas)
          build SDL_image SDL_image "-DSDL2IMAGE_PNG=OFF -DSDL2IMAGE_JPG=OFF -DSDL2IMAGE_WEBP=OFF"

          # SDL_mixer (mínimo estable)
          build SDL_mixer SDL_mixer "-DSDL2MIXER_OGG=OFF -DSDL2MIXER_MP3=OFF"

          # SDL_ttf (usa freetype interno)
          build SDL_ttf SDL_ttf "-DSDL2TTF_VENDORED=ON"

      - name: Upload per ABI
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-${{ matrix.abi }}
          path: output/${{ matrix.abi }}

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create ZIP
        run: |
          mkdir final
          cp -r SDL2-*/* final/ || true
          zip -r SDL2-FULL-ANDROID.zip final

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-FULL
          path: SDL2-FULL-ANDROID.zip
