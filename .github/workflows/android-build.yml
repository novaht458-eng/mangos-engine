name: Mangos Engine Forge

on: [push]

jobs:
  forge-sdl2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mangos Repo
        uses: actions/checkout@v4

      - name: Checkout Official SDL2 Source
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: SDL2
          path: SDL_Source

      - name: Set up Android NDK
        uses: n0rt3n/setup-android-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile libSDL2.so (arm64-v8a)
        run: |
          mkdir -p SDL_Source/build-android
          cd SDL_Source/build-android
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
            -DCMAKE_SYSTEM_VERSION=21 \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_HIDAPI=ON
          cmake --build . --parallel $(nproc)

      - name: Save Mangos Core Binary
        uses: actions/upload-artifact@v4
        with:
          name: libSDL2-mangos-arm64
          path: SDL_Source/build-android/libSDL2.so
