name: Mangos Engine Forge

on: [push]

jobs:
  forge-sdl2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Mangos Repo
        uses: actions/checkout@v4

      - name: Checkout Official SDL2 Source
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL2
          path: SDL_Source

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Compile libSDL2.so (arm64-v8a)
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653

          mkdir -p SDL_Source/build-android
          cd SDL_Source/build-android

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=21 \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST=OFF \
            -DSDL_HIDAPI=ON

          cmake --build . --parallel

      - name: Save Mangos Core Binary
        uses: actions/upload-artifact@v4
        with:
          name: libSDL2-mangos-arm64
          path: SDL_Source/build-android/libSDL2.so
