name: Mangos SDL2 Full Pack

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Mangos Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build zip

      # 🔹 SDL2 BASE
      - name: Clone SDL2
        run: |
          git clone https://github.com/libsdl-org/SDL.git SDL
          cd SDL && git checkout SDL2

      - name: Clone SDL_image
        run: |
          git clone https://github.com/libsdl-org/SDL_image.git
          cd SDL_image && git checkout SDL2

      - name: Clone SDL_mixer
        run: |
          git clone https://github.com/libsdl-org/SDL_mixer.git
          cd SDL_mixer && git checkout SDL2

      - name: Clone SDL_ttf
        run: |
          git clone https://github.com/libsdl-org/SDL_ttf.git
          cd SDL_ttf && git checkout SDL2

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build ALL (${{ matrix.abi }})
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653
          ABI=${{ matrix.abi }}

          mkdir -p output/$ABI

          # 🔥 1. BUILD + INSTALL SDL2 (EL FIX REAL)
          mkdir -p build-SDL-$ABI
          cd build-SDL-$ABI

          cmake ../SDL \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF

          cmake --build .
          cmake --install .

          cp install/lib/*.so ../output/$ABI/ 2>/dev/null || true

          cd ..

          # 🔧 función para libs dependientes
          build () {
            NAME=$1
            SRC=$2
            EXTRA=$3

            mkdir -p build-$NAME-$ABI
            cd build-$NAME-$ABI

            cmake ../$SRC \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=21 \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL2_DIR=$PWD/../build-SDL-$ABI/install/lib/cmake/SDL2 \
              -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON \
              $EXTRA

            cmake --build . || exit 1

            cp *.so ../output/$ABI/ 2>/dev/null || true
            cd ..
          }

          # 🔥 2. LIBS QUE DEPENDEN DE SDL2
          build SDL_image SDL_image "-DSDL2IMAGE_VENDORED=ON"
          build SDL_mixer SDL_mixer "-DSDL2MIXER_VENDORED=ON"
          build SDL_ttf SDL_ttf "-DSDL2TTF_VENDORED=ON"

      - name: Upload per ABI
        uses: actions/upload-artifact@v4
