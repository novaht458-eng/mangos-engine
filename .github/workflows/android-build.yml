name: Mangos SDL2 Full Pack

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Mangos Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build zip

      # 🔹 Clonar SDL2
      - name: Clone SDL2
        run: |
          git clone --recursive https://github.com/libsdl-org/SDL.git SDL
          cd SDL
          git checkout SDL2

      # 🔹 SDL_image
      - name: Clone SDL_image
        run: |
          git clone --recursive https://github.com/libsdl-org/SDL_image.git SDL_image
          cd SDL_image
          git checkout SDL2
          git submodule update --init --recursive

      # 🔹 SDL_mixer
      - name: Clone SDL_mixer
        run: |
          git clone --recursive https://github.com/libsdl-org/SDL_mixer.git SDL_mixer
          cd SDL_mixer
          git checkout SDL2
          git submodule update --init --recursive

      # 🔹 SDL_ttf
      - name: Clone SDL_ttf
        run: |
          git clone --recursive https://github.com/libsdl-org/SDL_ttf.git SDL_ttf
          cd SDL_ttf
          git checkout SDL2
          git submodule update --init --recursive

      # 🔹 Android
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      # 🔥 BUILD
      - name: Build ALL (${{ matrix.abi }})
        run: |
          export ANDROID_NDK="$ANDROID_HOME/ndk/25.2.9519653"
          ABI="${{ matrix.abi }}"

          mkdir -p "output/$ABI"

          # =========================
          # 🔥 SDL2 (BASE)
          # =========================
          mkdir -p "build-SDL-$ABI"
          cd "build-SDL-$ABI"

          cmake ../SDL \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="$ABI" \
            -DANDROID_PLATFORM=21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/install" \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF

          cmake --build . --target install

          cp install/lib/*.so "../output/$ABI/" 2>/dev/null || true
          cd ..

          # =========================
          # 🔧 FUNCIÓN PARA LIBS
          # =========================
          build_lib () {
            NAME=$1
            SRC=$2
            TARGET=$3
            EXTRA=$4

            mkdir -p "build-$NAME-$ABI"
            cd "build-$NAME-$ABI"

            cmake ../$SRC \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$ABI" \
              -DANDROID_PLATFORM=21 \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL2_DIR="$PWD/../build-SDL-$ABI/install/lib/cmake/SDL2" \
              -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ON \
              $EXTRA

            # 🔥 SOLO LIB (evita glfont y ejemplos)
            cmake --build . --target "$TARGET" || exit 1

            cp *.so "../output/$ABI/" 2>/dev/null || true
            cd ..
          }

          # =========================
          # 🔥 LIBS SDL2
          # =========================
          build_lib SDL_image SDL_image SDL2_image "-DSDL2IMAGE_VENDORED=ON -DSDL2IMAGE_AVIF=OFF"
          build_lib SDL_mixer SDL_mixer SDL2_mixer "-DSDL2MIXER_VENDORED=ON"
          build_lib SDL_ttf SDL_ttf SDL2_ttf "-DSDL2TTF_VENDORED=ON"

      - name: Upload per ABI
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-${{ matrix.abi }}
          path: output/${{ matrix.abi }}

  # =========================
  # 📦 PACKAGE FINAL MULTI-ABI
  # =========================
  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create multi-ABI ZIP
        run: |
          mkdir -p final/arm64-v8a
          mkdir -p final/armeabi-v7a

          cp -r SDL2-arm64-v8a/* final/arm64-v8a/ || true
          cp -r SDL2-armeabi-v7a/* final/armeabi-v7a/ || true

          zip -r SDL2-FULL-ANDROID.zip final

      - name: Upload FINAL ZIP
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-FULL
          path: SDL2-FULL-ANDROID.zip
