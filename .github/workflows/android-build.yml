name: Mangos SDL2 Full Pack

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build zip

      # 🔹 SDL2 base
      - name: Clone SDL2
        run: |
          git clone https://github.com/libsdl-org/SDL.git SDL
          cd SDL
          git checkout SDL2

      # 🔹 Extensiones
      - name: Clone SDL_image
        run: git clone https://github.com/libsdl-org/SDL_image.git

      - name: Clone SDL_mixer
        run: git clone https://github.com/libsdl-org/SDL_mixer.git

      - name: Clone SDL_ttf
        run: git clone https://github.com/libsdl-org/SDL_ttf.git

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build ALL SDL libs (${{ matrix.abi }})
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653
          export ABI=${{ matrix.abi }}

          mkdir -p output/$ABI

          build_lib () {
            NAME=$1
            SRC=$2

            mkdir -p build-$NAME-$ABI
            cd build-$NAME-$ABI

            cmake ../$SRC \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=21 \
              -DCMAKE_BUILD_TYPE=Release \
              -DSDL2_DIR=$PWD/../build-SDL-$ABI \
              -DSDL_SHARED=ON \
              -DSDL_STATIC=OFF

            cmake --build .

            cp *.so ../output/$ABI/ || true
            cd ..
          }

          # Orden importa
          build_lib SDL SDL
          build_lib SDL_image SDL_image
          build_lib SDL_mixer SDL_mixer
          build_lib SDL_ttf SDL_ttf

      - name: Upload per-ABI
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-${{ matrix.abi }}
          path: output/${{ matrix.abi }}

  # 🔥 Job final que junta TODO en un ZIP
  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create ZIP
        run: |
          mkdir final
          cp -r SDL2-*/* final/ || true
          zip -r SDL2-FULL-ANDROID.zip final

      - name: Upload FINAL ZIP
        uses: actions/upload-artifact@v4
        with:
          name: SDL2-FULL
          path: SDL2-FULL-ANDROID.zip
